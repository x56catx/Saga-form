<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>佐賀ソリューションフェア 2026 — 管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f7;
  --white: #ffffff;
  --border: #e5e7eb;
  --border2: #d1d5db;
  --red: #7B2228;
  --red-light: #fef2f2;
  --text: #111827;
  --text-sub: #6b7280;
  --text-hint: #9ca3af;
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --green: #059669;
  --green-light: #ecfdf5;
  --orange: #d97706;
}
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.header-left { display: flex; align-items: center; gap: 14px; }
.header-badge { background: var(--red); color: white; font-family: 'Bebas Neue', sans-serif; font-size: 0.8rem; letter-spacing: 0.15em; padding: 4px 12px; border-radius: 4px; }
.header-title { font-size: 0.85rem; font-weight: 500; color: var(--text-sub); }
.header-right { display: flex; align-items: center; gap: 10px; }
.refresh-btn { display: flex; align-items: center; gap: 6px; padding: 7px 16px; background: var(--white); border: 1px solid var(--border2); border-radius: 8px; color: var(--text-sub); font-size: 0.75rem; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.refresh-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }
.last-updated { font-size: 0.72rem; color: var(--text-hint); }
.main { padding: 1.75rem 2rem 4rem; max-width: 1400px; margin: 0 auto; }

/* KPI Grid */
.kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 14px; margin-bottom: 1.75rem; }
.kpi-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 1.4rem 1.6rem; display: flex; align-items: flex-start; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); transition: box-shadow 0.2s; }
.kpi-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.25rem; }
.kpi-icon.red { background: var(--red-light); }
.kpi-icon.green { background: var(--green-light); }
.kpi-icon.blue { background: var(--blue-light); }
.kpi-icon.purple { background: var(--purple-light); }
.kpi-label { font-size: 0.7rem; color: var(--text-hint); font-weight: 500; letter-spacing: 0.05em; margin-bottom: 4px; }
.kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; margin-bottom: 3px; }
.kpi-value.red { color: var(--red); }
.kpi-value.green { color: var(--green); }
.kpi-value.blue { color: var(--blue); }
.kpi-value.purple { color: var(--purple); }

/* Sales Target Section */
.sales-target-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; margin-bottom: 1.75rem; }
.target-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.target-header { font-size: 0.9rem; font-weight: 700; margin-bottom: 12px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.target-row { margin-bottom: 10px; }
.target-info { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 4px; font-weight: 600; }
.target-bar-bg { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.target-bar-fill { height: 100%; transition: width 1s ease-out; border-radius: 3px; }

.panel { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.panel-header { padding: 1.1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 0.82rem; font-weight: 700; color: var(--text); }
.panel-body { padding: 1.25rem 1.5rem; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
thead th { padding: 10px 16px; text-align: left; font-size: 0.68rem; font-weight: 700; color: var(--text-hint); text-transform: uppercase; border-bottom: 1px solid var(--border); background: #fafafa; }
td { padding: 13px 16px; color: var(--text-sub); border-bottom: 1px solid var(--border); }

.loading { display: flex; align-items: center; justify-content: center; padding: 2.5rem; gap: 10px; color: var(--text-hint); font-size: 0.8rem; }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-badge">TOSHIBA TEC</span>
    <span class="header-title">佐賀ソリューションフェア 2026　管理画面</span>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated">—</span>
    <button class="refresh-btn" onclick="loadData()">更新</button>
  </div>
</div>

<div class="main">
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon red">📋</div>
      <div>
        <div class="kpi-label">総申し込み社数</div>
        <div class="kpi-value red" id="kpi-total">0</div>
        <div class="kpi-sub">全体目標: 30社</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon green">👥</div>
      <div>
        <div class="kpi-label">総来場予定人数</div>
        <div class="kpi-value green" id="kpi-attendees">0</div>
        <div class="kpi-sub">全体目標: 50名</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon blue">🛒</div>
      <div>
        <div class="kpi-label">ECサイト運用</div>
        <div class="kpi-value blue" id="kpi-ec">0</div>
        <div class="kpi-sub">参加予定社数</div>
      </div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon purple">📱</div>
      <div>
        <div class="kpi-label">SNS運用</div>
        <div class="kpi-value purple" id="kpi-sns">0</div>
        <div class="kpi-sub">参加予定社数</div>
      </div>
    </div>
  </div>

  <h3 style="font-size: 0.9rem; margin-bottom: 12px; color: var(--text-sub);">担当者別 目標達成率</h3>
  <div class="sales-target-grid" id="sales-targets">
    </div>

  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">最新の申し込み状況</span>
      <span id="table-count" style="font-size: 0.7rem; color: var(--text-hint);">0 件</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日時</th>
            <th>企業名</th>
            <th>来場者</th>
            <th>時間</th>
            <th>セミナー</th>
            <th>担当営業</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="6" class="no-data">取得中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxxwhZQA78m7GF9bO-A0TtZH466RVOv1z5wV-c22R4CYZBm2rQkxsvh_QlzpAHNnbbb/exec';

// 担当者別の詳細目標設定
var TARGET_CONFIG = {
  '山本 和寛': { company: 10, attendee: 15 },
  '野田 健次': { company: 10, attendee: 15 },
  '上野 瑠久': { company: 5, attendee: 10 },
  '黒川 祐司': { company: 5, attendee: 10 },
  '真宮 清':   { company: 5, attendee: 10 },
  'わからない': { company: 5, attendee: 10 }
};

var allData = [];

function loadData() {
  document.getElementById('table-body').innerHTML = '<tr><td colspan="6" class="loading"><div class="spinner"></div>同期中...</td></tr>';
  fetch(SCRIPT_URL + '?action=get')
    .then(r => r.json())
    .then(d => {
      allData = Array.isArray(d) ? d : [];
      render();
      document.getElementById('last-updated').textContent = '最終同期: ' + new Date().toLocaleTimeString();
    })
    .catch(e => {
      console.error(e);
      document.getElementById('table-body').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px; color:red;">データの読み込みに失敗しました</td></tr>';
    });
}

function render() {
  renderKPI();
  renderSalesTargets();
  renderTable();
}

function renderKPI() {
  var t = allData.length;
  var att = allData.reduce((s, d) => s + [d.attendee1, d.attendee2, d.attendee3].filter(a => a && a.trim()).length, 0);
  var ec = allData.filter(d => d.seminars && d.seminars.indexOf('EC') >= 0).length;
  var sns = allData.filter(d => d.seminars && d.seminars.indexOf('SNS') >= 0).length;

  document.getElementById('kpi-total').textContent = t;
  document.getElementById('kpi-attendees').textContent = att;
  document.getElementById('kpi-ec').textContent = ec;
  document.getElementById('kpi-sns').textContent = sns;
}

function renderSalesTargets() {
  var html = '';
  Object.keys(TARGET_CONFIG).forEach(name => {
    var conf = TARGET_CONFIG[name];
    var myData = allData.filter(d => d.sales === name);
    
    // 実績計算
    var actCompany = myData.length;
    var actAttendee = myData.reduce((s, d) => s + [d.attendee1, d.attendee2, d.attendee3].filter(a => a && a.trim()).length, 0);
    
    // 達成率
    var pctComp = Math.min(Math.round((actCompany / conf.company) * 100), 100);
    var pctAtt = Math.min(Math.round((actAttendee / conf.attendee) * 100), 100);
    
    html += `
      <div class="target-card">
        <div class="target-header">${name}</div>
        
        <div class="target-row">
          <div class="target-info">
            <span>社数目標 (${pctComp}%)</span>
            <span>${actCompany} / ${conf.company} 社</span>
          </div>
          <div class="target-bar-bg">
            <div class="target-bar-fill" style="width: ${pctComp}%; background: ${pctComp >= 100 ? 'var(--green)' : 'var(--red)'}"></div>
          </div>
        </div>
        
        <div class="target-row">
          <div class="target-info">
            <span>人数目標 (${pctAtt}%)</span>
            <span>${actAttendee} / ${conf.attendee} 名</span>
          </div>
          <div class="target-bar-bg">
            <div class="target-bar-fill" style="width: ${pctAtt}%; background: ${pctAtt >= 100 ? 'var(--green)' : 'var(--blue)'}"></div>
          </div>
        </div>
      </div>
    `;
  });
  document.getElementById('sales-targets').innerHTML = html;
}

function renderTable() {
  document.getElementById('table-count').textContent = allData.length + ' 件';
  if (allData.length === 0) {
    document.getElementById('table-body').innerHTML = '<tr><td colspan="6" style="text-align:center; padding:20px;">データがありません</td></tr>';
    return;
  }

  var html = allData.map(d => `
    <tr>
      <td>${d.timestamp}</td>
      <td style="font-weight:bold; color:var(--text);">${d.company}</td>
      <td>${d.attendee1}${d.attendee2 ? ' 他' : ''}</td>
      <td>${d.time}</td>
      <td>${d.seminars}</td>
      <td>${d.sales}</td>
    </tr>
  `).join('');
  document.getElementById('table-body').innerHTML = html;
}

window.onload = loadData;
</script>
</body>
</html>
