<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>佐賀ソリューションフェア 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #B91C1C;
  --red2: #7f1d1d;
  --gold: #c9a84c;
  --bg: #0e0e0e;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(201,168,76,0.4);
  --text: #f0ede8;
  --text-sub: rgba(240,237,232,0.5);
  --text-hint: rgba(240,237,232,0.3);
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

.hero {
  position: relative;
  background: var(--red2);
  overflow: hidden;
  padding: 4rem 2rem 3rem;
  text-align: center;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
}
.hero-glow {
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 500px; height: 300px;
  background: radial-gradient(ellipse, rgba(185,28,28,0.6) 0%, transparent 70%);
  pointer-events: none;
}
.hero-eyebrow {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  color: var(--gold);
  margin-bottom: 1rem;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}
.hero-eyebrow::before,
.hero-eyebrow::after {
  content: '';
  width: 40px; height: 1px;
  background: var(--gold);
  opacity: 0.5;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.2rem, 8vw, 3.8rem);
  letter-spacing: 0.08em;
  line-height: 1.1;
  color: #fff;
  position: relative;
  margin-bottom: 0.5rem;
}
.hero-title span { color: var(--gold); }
.hero-sub {
  font-size: 0.8rem;
  color: rgba(255,255,255,0.55);
  letter-spacing: 0.1em;
  position: relative;
  margin-bottom: 2rem;
}
.hero-chips {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  position: relative;
}
.hero-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.85);
  padding: 6px 14px;
  border-radius: 30px;
}

.form-wrap {
  max-width: 560px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem 5rem;
}

.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 2.5rem 0 1.2rem;
}
.section-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.15em;
  color: var(--gold);
  opacity: 0.8;
  white-space: nowrap;
}
.section-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.section-head:first-child { margin-top: 0; }

.field { margin-bottom: 1rem; }
.field-label {
  font-size: 0.78rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  color: var(--text-sub);
  margin-bottom: 0.5rem;
  display: flex;
  align-items: center;
  gap: 7px;
}
.badge-req {
  font-size: 0.62rem;
  background: rgba(185,28,28,0.3);
  border: 1px solid rgba(185,28,28,0.5);
  color: #fca5a5;
  padding: 1px 6px;
  border-radius: 20px;
}
.badge-opt {
  font-size: 0.62rem;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text-hint);
  padding: 1px 6px;
  border-radius: 20px;
}

input[type="text"],
input[type="time"] {
  width: 100%;
  padding: 12px 16px;
  font-size: 0.92rem;
  font-family: inherit;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
input[type="text"]:focus,
input[type="time"]:focus {
  border-color: var(--gold);
  background: var(--surface2);
}
input::placeholder { color: var(--text-hint); font-size: 0.83rem; }
input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.6); }

.helper {
  font-size: 0.72rem;
  color: var(--text-hint);
  margin-top: 5px;
}

.attendee-list { display: flex; flex-direction: column; gap: 8px; }
.attendee-row {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 11px 14px;
  transition: border-color 0.2s;
}
.attendee-row:focus-within { border-color: var(--gold); }
.att-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--red2);
  border: 1px solid rgba(185,28,28,0.5);
  color: rgba(255,255,255,0.8);
  font-size: 0.72rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.attendee-row input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 0.9rem;
  font-family: inherit;
  outline: none;
}
.attendee-row input::placeholder { color: var(--text-hint); font-size: 0.83rem; }
.remove-btn {
  background: none;
  border: none;
  color: var(--text-hint);
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
  padding: 3px;
  border-radius: 4px;
  transition: color 0.15s;
}
.remove-btn:hover { color: #fca5a5; }

.add-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  padding: 10px;
  border: 1px dashed rgba(255,255,255,0.12);
  border-radius: 8px;
  background: none;
  color: var(--text-hint);
  font-size: 0.82rem;
  font-family: inherit;
  cursor: pointer;
  margin-top: 6px;
  transition: border-color 0.2s, color 0.2s;
}
.add-btn:hover { border-color: var(--gold); color: var(--gold); }

.count-tag {
  font-size: 0.72rem;
  color: var(--text-hint);
  margin-left: auto;
  font-weight: 400;
}

.check-list { display: flex; flex-direction: column; gap: 8px; }
.check-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
